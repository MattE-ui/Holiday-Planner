<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Holiday Planner · Landing Page — 3 Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

  @keyframes dcRise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
  @keyframes dcFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes dcSettle { from { transform: scale(1.07); } to { transform: scale(1); } }

  /* Visible by default; animate only as a progressive enhancement so content
     never gets stuck hidden (print / reduced-motion / capture environments). */
  .dc-rise, .dc-fade { opacity: 1; }
  @media (prefers-reduced-motion: no-preference) {
    .dc-rise { animation: dcRise 820ms cubic-bezier(.22,1,.36,1) both; animation-delay: 140ms; }
    .dc-fade { animation: dcFade 700ms ease both; }
  }

  .dc-cta { transition: transform .25s cubic-bezier(.22,1,.36,1), box-shadow .25s, background .25s; }
  .dc-cta:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(0,0,0,.32) !important; }
  button { font-family: inherit; }

  .no-sb::-webkit-scrollbar { display: none; }
  .no-sb { scrollbar-width: none; -ms-overflow-style: none; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#1F4E5F" />
    <rect x="30" y="30" width="40" height="40" rx="8" fill="#5BA7A0" />
    <path d="M44 56 L40 50 L52 41 a3 3 0 0 1 4 4 L47 57 L56 60 L54 63 L44 60 Z" fill="#fff" />
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="directionA.jsx"></script>
<script type="text/babel" src="directionB.jsx"></script>
<script type="text/babel" src="directionC.jsx"></script>
<script type="text/babel" src="directionC-mobile.jsx"></script>
<script type="text/babel" src="directionC-many.jsx"></script>
<script type="text/babel" src="locations-screen.jsx"></script>
<script type="text/babel" src="accommodations-screen.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const W = 1440, H = 900;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="landing"
          title="Landing Page · Autumn Holiday 2026"
          subtitle="One cinematic featured trip + smaller upcoming ones · three directions to compare. Hover the cards & locations — they're live. Open any board fullscreen with the focus button."
        >
          <DCArtboard id="dir-a" label="A · Editorial Cover — closest to your brand DNA" width={W} height={H}>
            <window.DirectionA />
          </DCArtboard>
          <DCArtboard id="dir-b" label="B · Split Atlas — the hero answers your comparison" width={W} height={H}>
            <window.DirectionB />
          </DCArtboard>
          <DCArtboard id="dir-c" label="C · Atelier — tactile, image-dense, flip the deck" width={W} height={H}>
            <window.DirectionC />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="c-responsive"
          title="C · Mobile & scaling"
          subtitle="How the Atelier deck behaves on a phone and with more than 3 locations. The fan is a flourish for 3–4; beyond that it becomes a swipeable / scrollable rail of postcards — same metaphor, any number of candidates. Tap & swipe the cards; they're live."
        >
          <DCArtboard id="c-m3" label="Mobile · 3 locations — swipe the deck, tap to re-skin" width={446} height={918}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", width: "100%", height: "100%" }}>
              <window.IOSDevice dark>
                <window.DirectionCMobile />
              </window.IOSDevice>
            </div>
          </DCArtboard>
          <DCArtboard id="c-m6" label="Mobile · 6 locations — same deck, just more to swipe" width={446} height={918}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", width: "100%", height: "100%" }}>
              <window.IOSDevice dark>
                <window.DirectionCMobile locations={window.HP.manyLocations} />
              </window.IOSDevice>
            </div>
          </DCArtboard>
          <DCArtboard id="c-d6" label="Desktop · 6 locations — the fan becomes a scrollable hand" width={W} height={H}>
            <window.DirectionCMany />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="trip-locations"
          title="Trip · Locations"
          subtitle="What opens when you 'Open this trip'. Each candidate location gets a cinematic band with its blurb, a late-October seasonal snapshot (day high · sea · sun · flights), the honest price/stays status, and a way into its accommodations. Hover a band to feel the image; hover the buttons."
        >
          <DCArtboard id="loc-desktop" label="Autumn Holiday 2026 — locations on the shortlist" width={W} height={1880}>
            <window.LocationsScreen />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="trip-accommodations"
          title="Location · Accommodations"
          subtitle="What opens from 'View accommodations' on a location. The stays you're comparing for Kalkan, side by side — photo, rating, key specs, and the honest price (or 'price to confirm'). Hover a card; click 'View details' for the full accommodation."
        >
          <DCArtboard id="accom-desktop" label="Kalkan — 3 stays being compared" width={W} height={1240}>
            <window.AccommodationsScreen />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
